<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <title>Steen Papier Schaar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Steen Papier Schaar</h1>

    <!-- Winstreak bord -->
    <div class="streak-box">
        <p class="streak-label">Win streak: <span id="winStreak">0</span></p>
        <p class="streak-label">Hoogste streak: <span id="hoogsteStreak">0</span></p>
    </div>

    <!-- Score bord -->
    <p>Score speler: <span id="spelerScore">0</span></p>
    <p>Score computer: <span id="computerScore">0</span></p>

    <p>
        <!-- Computer -->
        <span id="computer"></span>
    </p>
    <p>
        <!-- Speler -->
        <span id="speler"></span>
    </p>
    <p>
        <!-- Uitkomst -->
        <span id="resultaat"></span>
    </p>
        <!-- Knoppen -->
    <button id="steen" class="button">Steen</button>
    <button id="papier" class="button">Papier</button>
    <button id="schaar" class="button">Schaar</button>

        <!-- Afbeelding -->
    <img src="Images/image.png" alt="Steen Papier Schaar" class="image">

        <!-- JavaScript oproepen -->
    <script src="Javascript.js"></script>
</body>
</html>
